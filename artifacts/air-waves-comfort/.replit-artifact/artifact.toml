kind = "web"
previewPath = "/"
title = "Air Waves Comfort"
version = "1.0.0"
id = "artifacts/air-waves-comfort"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21520

[services.development]
run = "pnpm --filter @workspace/air-waves-comfort run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/air-waves-comfort", "run", "build" ]
publicDir = "artifacts/air-waves-comfort/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21520"
BASE_PATH = "/"
