name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  awc-nextjs:
    name: awc-nextjs — lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/awc-nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck
